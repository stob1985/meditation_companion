<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#c00" stroke-width="4"/>

  <!-- Car silhouette -->
  <g transform="translate(100, 100)">
    <!-- Car body -->
    <rect x="-40" y="-15" width="80" height="30" fill="#333" rx="5"/>
    <!-- Car top -->
    <rect x="-25" y="-30" width="50" height="20" fill="#333" rx="3"/>
    <!-- Wheels -->
    <circle cx="-25" cy="15" r="8" fill="#1a1a1a"/>
    <circle cx="25" cy="15" r="8" fill="#1a1a1a"/>
    <!-- Windows -->
    <rect x="-20" y="-27" width="18" height="15" fill="#87ceeb" rx="2"/>
    <rect x="2" y="-27" width="18" height="15" fill="#87ceeb" rx="2"/>
  </g>

  <!-- Warning sign (prohibition symbol) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#c00" stroke-width="8"/>
  <line x1="45" y1="45" x2="155" y2="155" stroke="#c00" stroke-width="8" stroke-linecap="round"/>

  <!-- Text -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#c00" text-anchor="middle">
    NE IGYÁL ÉS VEZESS!
  </text>
</svg>
